<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Tabungan Pribadi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .info-panel { display: flex; justify-content: space-between; margin-bottom: 20px; background: #ecf0f1; padding: 15px; border-radius: 6px; font-weight: bold; }
        .balance-box { font-size: 1.2rem; color: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2980b9; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .loading { text-align: center; font-size: 1.2rem; color: #7f8c8d; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Laporan Tabungan Pribadi (Cloud Sync)</h2>
    
    <div class="info-panel">
        <div id="tanggal-cetak">Periode data per: -</div>
        <div class="balance-box">TOTAL FINAL BALANCE: <span id="saldo-akhir">Rp 0</span></div>
    </div>

    <div id="loading-text" class="loading">Menghubungkan ke Google Sheets... Mohon tunggu...</div>

    <table>
        <thead>
            <tr>
                <th>Jenis</th>
                <th>Tanggal</th>
                <th>Keterangan</th>
                <th>Sangkutan</th>
                <th>Sumber</th>
                <th>Nominal</th>
            </tr>
        </thead>
        <tbody id="isi-tabel">
            </tbody>
    </table>
</div>

<script>
    // === URL WEB APP GOOGLE APPS SCRIPT ANDA ===
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbzOXSbJzgV7Lyu77NTq0LOFU_kqGsT99yh5ZDORSCK3NO4TnScRjny_SEG2otvgFwv-/exec";

    let dataTabungan = [];

    // Mengatur tanggal otomatis di sistem web
    const opsi = { year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('tanggal-cetak').innerText = 'Periode data per: ' + new Date().toLocaleDateString('id-ID', opsi);

    // Fungsi otomatis mengambil data saat halaman web dibuka
    function muatDataDariSheets() {
        const loadingElemen = document.getElementById('loading-text');
        loadingElemen.style.display = "block";

        fetch(CLOUD_API_URL)
            .then(response => response.json())
            .then(data => {
                dataTabungan = data;
                perbaruiTabel();
                loadingElemen.style.display = "none";
            })
            .catch(err => {
                console.error("Gagal memuat data dari cloud:", err);
                loadingElemen.innerText = "Gagal memuat data. Periksa kembali deployment Apps Script Anda.";
            });
    }

    // Fungsi memproses array data menjadi baris tabel HTML
    function perbaruiTabel() {
        const isiTabel = document.getElementById('isi-tabel');
        const saldoAkhirElemen = document.getElementById('saldo-akhir');
        
        isiTabel.innerHTML = "";
        let totalBalance = 0;

        if (dataTabungan.length === 0) {
            isiTabel.innerHTML = `<tr><td colspan="6" style="text-align:center;">Tidak ada data tabungan yang ditemukan di Google Sheets.</td></tr>`;
            saldoAkhirElemen.innerText = "Rp 0";
            return;
        }

        dataTabungan.forEach(item => {
            // Hitung total balance otomatis (Pemasukan ditambah, Pengeluaran dikurang)
            if (item.jenis.toLowerCase() === "pemasukan") {
                totalBalance += item.nominal;
            } else if (item.jenis.toLowerCase() === "pengeluaran") {
                totalBalance -= item.nominal;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${item.jenis}</strong></td>
                <td>${item.tanggal}</td>
                <td>${item.keterangan || '-'}</td>
                <td>${item.sangkutan || '-'}</td>
                <td>${item.sumber || '-'}</td>
                <td>Rp ${item.nominal.toLocaleString('id-ID')}</td>
            `;
            isiTabel.appendChild(row);
        });

        saldoAkhirElemen.innerText = "Rp " + totalBalance.toLocaleString('id-ID');
    }

    // Jalankan penarikan data otomatis sewaktu halaman pertama kali dimuat
    window.onload = muatDataDariSheets;
</script>

</body>
</html>
