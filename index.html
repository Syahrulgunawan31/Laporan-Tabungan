<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Tabungan Pribadi</title>
    <style>
        /* (Style CSS Anda tetap sama, tidak perlu diubah) */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1150px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; }
        .form-transaksi { background: #f8f9fa; padding: 20px; border-radius: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 150px; display: flex; flex-direction: column; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #2980b9; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>LAPORAN TABUNGAN PRIBADI</h2>
    
    <form class="form-transaksi" id="formTabungan">
        <div class="form-group">
            <label>Type</label>
            <select id="jenis">
                <option value="Masuk">Uang Masuk (+)</option>
                <option value="Piutang">Piutang (+)</option>
                <option value="Hutang">Hutang (-)</option>
            </select>
        </div>
        <div class="form-group"><label>Date</label><input type="date" id="tanggal" required></div>
        <div class="form-group"><label>Remarks</label><input type="text" id="keterangan" required></div>
        <div class="form-group"><label>Debtor/Creditor</label><input type="text" id="sangkutan"></div>
        <div class="form-group"><label>Source</label><input type="text" id="sumber"></div>
        <div class="form-group"><label>Nominal (Rp)</label><input type="number" id="nominal" required></div>
        <button type="submit" class="btn-tambah" id="submitBtn" style="height:42px; margin-top:20px;">Add</button>
    </form>

    <table id="tabel-tabungan">
        <thead><tr><th>Date</th><th>Remarks</th><th>Sangkutan</th><th>Source</th><th>Mutation</th></tr></thead>
        <tbody id="isi-tabel"></tbody>
    </table>
</div>

<script>
    const GSS_URL = "https://script.google.com/macros/s/AKfycbzuAiin9yQE4zAUhdgP-9giXkxnaHrFmZXg2hCu2WU2dwJKqdDK4gJWpO2v-vRf94Mh/exec";
    const form = document.getElementById('formTabungan');

    // Fungsi saat tombol Add ditekan
    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const dataBaru = {
            jenis: document.getElementById('jenis').value,
            tanggal: document.getElementById('tanggal').value,
            keterangan: document.getElementById('keterangan').value,
            sangkutan: document.getElementById('sangkutan').value,
            sumber: document.getElementById('sumber').value,
            nominal: document.getElementById('nominal').value
        };

        // Kirim ke Google Sheets
        fetch(GSS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dataBaru)
        }).then(() => {
            alert("Data berhasil dikirim ke Google Sheets!");
            location.reload(); 
        }).catch(err => alert("Gagal kirim: " + err));
    });

    // Set tanggal hari ini
    document.getElementById('tanggal').value = new Date().toISOString().substring(0, 10);
</script>

</body>
</html>
